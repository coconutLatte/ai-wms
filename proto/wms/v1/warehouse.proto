syntax = "proto3";

package wms.v1;

option go_package = "github.com/ai-wms/ai-wms/proto/wms/v1;wmsv1";

import "google/protobuf/timestamp.proto";

// Warehouse represents a physical warehouse.
message Warehouse {
  string id = 1;
  string code = 2;
  string name = 3;
  string address = 4;
  string status = 5;  // active, inactive, archived
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

message Zone {
  string id = 1;
  string warehouse_id = 2;
  string code = 3;
  string name = 4;
  string zone_type = 5;  // receiving, storage, picking, shipping, returns, staging
  string status = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}

message Location {
  string id = 1;
  string zone_id = 2;
  string warehouse_id = 3;
  string code = 4;
  string barcode = 5;
  string location_type = 6;  // pallet, shelf, floor, conveyor, agv
  string status = 7;  // empty, occupied, reserved, blocked
  double max_weight = 8;
  double max_volume = 9;
  int32 max_qty = 10;
  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp updated_at = 12;
}

service WarehouseService {
  rpc CreateWarehouse(CreateWarehouseRequest) returns (Warehouse);
  rpc GetWarehouse(GetWarehouseRequest) returns (Warehouse);
  rpc ListWarehouses(ListWarehousesRequest) returns (ListWarehousesResponse);
  rpc UpdateWarehouse(UpdateWarehouseRequest) returns (Warehouse);
  rpc CreateZone(CreateZoneRequest) returns (Zone);
  rpc ListZones(ListZonesRequest) returns (ListZonesResponse);
  rpc CreateLocation(CreateLocationRequest) returns (Location);
  rpc ListLocations(ListLocationsRequest) returns (ListLocationsResponse);
}

message CreateWarehouseRequest {
  string code = 1;
  string name = 2;
  string address = 3;
}

message GetWarehouseRequest {
  string id = 1;
}

message ListWarehousesRequest {
  int32 page_size = 1;
  string page_token = 2;
}

message ListWarehousesResponse {
  repeated Warehouse warehouses = 1;
  string next_page_token = 2;
}

message UpdateWarehouseRequest {
  string id = 1;
  string name = 2;
  string address = 3;
  string status = 4;
}

message CreateZoneRequest {
  string warehouse_id = 1;
  string code = 2;
  string name = 3;
  string zone_type = 4;
}

message ListZonesRequest {
  string warehouse_id = 1;
}

message ListZonesResponse {
  repeated Zone zones = 1;
}

message CreateLocationRequest {
  string zone_id = 1;
  string warehouse_id = 2;
  string code = 3;
  string barcode = 4;
  string location_type = 5;
}

message ListLocationsRequest {
  string zone_id = 1;
  string warehouse_id = 2;
}

message ListLocationsResponse {
  repeated Location locations = 1;
}
